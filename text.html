<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Club Manager</title>
    <!-- Tailwind CSS para diseño moderno rápido -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans overflow-x-hidden">

    <!-- PANEL SUPERIOR: Estadísticas en tiempo real -->
    <header class="bg-slate-900/80 backdrop-blur border-b border-slate-800 p-4 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex flex-wrap justify-between items-center gap-4">
            <h1 class="text-xl font-black tracking-wider text-amber-500">FC MANAGER</h1>
            
            <div class="flex gap-6 text-sm bg-slate-950/60 px-4 py-2 rounded-full border border-slate-800">
                <div>Formación: <span class="font-bold text-amber-400">4-3-3</span></div>
                <div>Jugadores: <span id="team-count" class="font-bold text-amber-400">0/11</span></div>
                <div>Química: <span class="font-bold text-emerald-400">-- (Próximamente)</span></div>
                <div>Monedas: <span id="user-coins" class="font-bold text-yellow-400">50,000 🪙</span></div>
            </div>

            <!-- Gran indicador de GRL de Equipo -->
            <div class="bg-gradient-to-r from-amber-500 to-yellow-500 text-slate-950 px-6 py-2 rounded-xl text-center shadow-lg shadow-amber-500/10">
                <p class="text-xs font-bold uppercase tracking-widest opacity-80">GRL EQUIPO</p>
                <p id="team-grl" class="text-3xl font-black">0</p>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- COLUMNA IZQUIERDA/CENTRO: Campo de Fútbol (Mi Plantilla) -->
        <section class="lg:col-span-2">
            <div class="soccer-field bg-emerald-950 rounded-2xl border-2 border-emerald-500/30 p-6 shadow-2xl relative min-h-[650px] flex flex-col justify-between overflow-hidden">
                <!-- Líneas del campo (Efecto visual) -->
                <div class="absolute inset-0 field-lines pointer-events-none"></div>

                <!-- Línea Delantera -->
                <div class="flex justify-around items-center z-10 my-2">
                    <div class="slot" data-pos="EI"><span class="slot-label">EI</span></div>
                    <div class="slot" data-pos="DC"><span class="slot-label">DC</span></div>
                    <div class="slot" data-pos="ED"><span class="slot-label">ED</span></div>
                </div>

                <!-- Línea Mediocampo -->
                <div class="flex justify-around items-center z-10 my-2">
                    <div class="slot" data-pos="MC-1" data-accept="MC"><span class="slot-label">MC</span></div>
                    <div class="slot" data-pos="MCD"><span class="slot-label">MCD</span></div>
                    <div class="slot" data-pos="MC-2" data-accept="MC"><span class="slot-label">MC</span></div>
                </div>

                <!-- Línea Defensiva -->
                <div class="flex justify-around items-center z-10 my-2">
                    <div class="slot" data-pos="LI"><span class="slot-label">LI</span></div>
                    <div class="slot" data-pos="DFC-1" data-accept="DFC"><span class="slot-label">DFC</span></div>
                    <div class="slot" data-pos="DFC-2" data-accept="DFC"><span class="slot-label">DFC</span></div>
                    <div class="slot" data-pos="LD"><span class="slot-label">LD</span></div>
                </div>

                <!-- Portero -->
                <div class="flex justify-center items-center z-10 my-2">
                    <div class="slot" data-pos="POR"><span class="slot-label">POR</span></div>
                </div>
            </div>
        </section>

        <!-- COLUMNA DERECHA: Mercado e Inventario -->
        <section class="flex flex-col gap-6">
            <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-xl flex-1">
                <h2 class="text-lg font-bold border-b border-slate-800 pb-2 mb-4 flex justify-between items-center">
                    <span>Mercado / Inventario</span>
                    <button id="btn-pack" class="bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold text-xs px-3 py-1.5 rounded-lg transition-all active:scale-95">
                        Abrir Sobre 🎁
                    </button>
                </h2>
                <!-- Lista de cartas disponibles -->
                <div id="market-list" class="grid grid-cols-2 gap-3 max-h-[550px] overflow-y-auto pr-2">
                    <!-- Las cartas se generarán dinámicamente con JS -->
                </div>
            </div>
        </section>
    </main>

    <!-- CAPA DE ANIMACIÓN CINEMÁTICA ÍCONO -->
    <div id="icon-pack-opener" class="fixed inset-0 bg-black/95 z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-500">
        <!-- Chispas / Destellos Dorados (CSS Animado) -->
        <div class="absolute inset-0 golden-flashes pointer-events-none"></div>
        <div class="absolute w-96 h-96 bg-amber-500/10 rounded-full blur-3xl animate-pulse"></div>
        
        <!-- Contenedor de la carta épica -->
        <div class="text-center z-10 transform scale-75 transition-transform duration-1000 ease-out" id="icon-card-stage">
            <h3 class="text-amber-400 text-xs font-black tracking-widest uppercase mb-6 animate-bounce">¡CARTA ÍCONO DETECTADA!</h3>
            <div id="icon-card-placeholder" class="flex justify-center"></div>
            <button id="close-animation" class="mt-8 bg-amber-500 hover:bg-amber-400 text-slate-950 font-black px-6 py-2 rounded-xl text-sm uppercase tracking-wider hidden">
                Continuar
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
